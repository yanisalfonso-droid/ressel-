<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f18" />
  <meta name="description" content="Resell Tracker Pro — Gérez votre business d'achat-revente." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Resell Tracker Pro</title>

<style>
/* ═══════════════════════════════════════════════════════════
   RESELL TRACKER v2.5 — DESIGN SYSTEM
   ═══════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

:root {
  --bg:         #0a0f18;
  --surface:    #111827;
  --card:       #161f2e;
  --border:     rgba(255, 255, 255, 0.08);
  --border-focus: rgba(0, 229, 160, 0.3);
  --accent:     #00ffa3;
  --accent-glow: rgba(0, 255, 163, 0.2);
  --positive:   #00ffa3;
  --negative:   #ff3e5e;
  --info:       #3b82f6;
  --warning:    #f59e0b;
  --text:       #f3f4f6;
  --text-dim:   #9ca3af;
  --text-muted: #6b7280;
  
  --font-ui:    'Plus Jakarta Sans', system-ui, sans-serif;
  --font-mono:  'JetBrains Mono', monospace;
  
  --radius-sm:  8px;
  --radius-md:  12px;
  --radius-lg:  20px;
  --shadow-sm:  0 4px 6px -1px rgba(0, 0, 0, 0.1);
  --shadow-lg:  0 20px 25px -5px rgba(0, 0, 0, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  background-image: 
    radial-gradient(circle at 0% 0%, rgba(0, 255, 163, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.03) 0%, transparent 50%);
  color: var(--text);
  font-family: var(--font-ui);
  line-height: 1.6;
  overflow-x: hidden;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
}

/* ── Typography & Accents ── */
h1, h2, h3 { font-weight: 800; letter-spacing: -0.02em; }
.mono { font-family: var(--font-mono); }
.grad-text {
  background: linear-gradient(135deg, #fff 30%, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* ── Header ── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  padding: 16px 24px;
  background: rgba(10, 15, 24, 0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 32px; height: 32px; background: var(--accent);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  color: #000; font-weight: 800; font-size: 14px;
  box-shadow: 0 0 15px var(--accent-glow);
}

/* ── Stats Grid ── */
.dashboard-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 20px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.stat-card:hover { border-color: var(--border-focus); transform: translateY(-2px); }
.stat-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em; font-weight: 600; margin-bottom: 8px; }
.stat-value { font-size: 24px; font-weight: 800; font-family: var(--font-mono); }
.stat-card-wide { grid-column: span 2; }

/* ── Inventory List ── */
.items-container { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
.item-card {
  background: var(--card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 12px;
  position: relative;
  transition: all 0.2s;
}
.item-img {
  width: 60px; height: 60px; border-radius: 10px; object-fit: cover;
  background: var(--surface); flex-shrink: 0;
}
.item-info { flex: 1; min-width: 0; }
.item-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { display: flex; gap: 8px; align-items: center; }

/* ── Badges ── */
.badge {
  padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase;
  background: rgba(255,255,255,0.05); color: var(--text-dim);
}
.badge-vendu { background: rgba(0, 255, 163, 0.1); color: var(--positive); border: 1px solid rgba(0, 255, 163, 0.2); }
.badge-stock { background: rgba(59, 130, 246, 0.1); color: var(--info); border: 1px solid rgba(59, 130, 246, 0.2); }

/* ── Navigation ── */
.nav-bar {
  position: fixed; bottom: 20px; left: 20px; right: 20px;
  height: 64px; background: rgba(22, 31, 46, 0.9);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 32px;
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 10px; z-index: 1000;
  box-shadow: var(--shadow-lg);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  color: var(--text-muted); text-decoration: none; font-size: 10px; font-weight: 600;
  transition: color 0.2s;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 20px; }

/* ── FAB ── */
.fab {
  width: 56px; height: 56px; background: var(--accent);
  border-radius: 28px; display: flex; align-items: center; justify-content: center;
  color: #000; font-size: 24px; border: none;
  box-shadow: 0 8px 20px var(--accent-glow);
  cursor: pointer; transition: transform 0.2s;
}
.fab:active { transform: scale(0.9); }

/* ── Modal Pro ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px); display: none; align-items: flex-end; z-index: 2000;
}
.modal-content {
  width: 100%; background: var(--surface); 
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 24px; padding-bottom: calc(24px + env(safe-area-inset-bottom));
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
.modal-overlay.active { display: flex; }
.modal-overlay.active .modal-content { transform: translateY(0); }

/* ── Inputs ── */
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; }
.input-control {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 12px 16px; color: #fff;
  font-family: var(--font-ui); font-size: 15px; transition: border-color 0.2s;
}
.input-control:focus { outline: none; border-color: var(--accent); }

.btn-primary {
  width: 100%; background: var(--accent); color: #000;
  border: none; padding: 16px; border-radius: var(--radius-md);
  font-weight: 700; font-size: 16px; cursor: pointer;
}

@media (min-width: 768px) {
  .dashboard-grid { grid-template-columns: repeat(4, 1fr); }
  .items-container { display: grid; grid-template-columns: repeat(2, 1fr); }
}

</style>
</head>
<body>

  <header class="app-header">
    <div class="logo">
      <div class="logo-icon">RT</div>
      <h1 class="grad-text">ResellTrack</h1>
    </div>
    <div class="live-status">
      <span style="font-size: 10px; font-weight: 800; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px;">PRO</span>
    </div>
  </header>

  <main id="view-dashboard">
    <div class="dashboard-grid">
      <div class="stat-card stat-card-wide">
        <div class="stat-label">Profit Net Total</div>
        <div class="stat-value" style="color: var(--positive); font-size: 32px;">1 245,50 €</div>
        <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">+12% vs mois dernier</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ROI Moyen</div>
        <div class="stat-value" style="color: var(--info);">42%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">En Stock</div>
        <div class="stat-value">14</div>
      </div>
    </div>

    <div style="padding: 0 20px 10px 20px; display: flex; justify-content: space-between; align-items: center;">
      <h2 style="font-size: 18px;">Inventaire Récent</h2>
      <a href="#" style="color: var(--accent); font-size: 13px; text-decoration: none; font-weight: 600;">Voir tout</a>
    </div>

    <div class="items-container">
      <div class="item-card">
        <div class="item-img" style="background: linear-gradient(45deg, #1e293b, #334155); display: flex; align-items: center; justify-content: center; font-size: 24px;">👟</div>
        <div class="item-info">
          <div class="item-title">Air Jordan 1 High 'Chicago'</div>
          <div class="item-meta">
            <span class="badge badge-stock">En Stock</span>
            <span class="mono" style="font-size: 12px; color: var(--text-dim);">Achat: 180€</span>
          </div>
        </div>
        <div style="text-align: right;">
          <div class="mono" style="font-weight: 700;">Est. 450€</div>
          <div style="font-size: 10px; color: var(--positive);">+150%</div>
        </div>
      </div>

      <div class="item-card">
        <div class="item-img" style="background: linear-gradient(45deg, #1e293b, #334155); display: flex; align-items: center; justify-content: center; font-size: 24px;">⌚</div>
        <div class="item-info">
          <div class="item-title">Apple Watch Series 9</div>
          <div class="item-meta">
            <span class="badge badge-vendu">Vendu</span>
            <span class="mono" style="font-size: 12px; color: var(--text-dim);">Profit: +85€</span>
          </div>
        </div>
        <div style="text-align: right;">
          <div class="mono" style="font-weight: 700; color: var(--positive);">390€</div>
          <div style="font-size: 10px; color: var(--text-muted);">12/02/24</div>
        </div>
      </div>
    </div>
  </main>

  <nav class="nav-bar">
    <a href="#" class="nav-item active">
      <span class="nav-icon">📊</span>
      <span>Stats</span>
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">📦</span>
      <span>Stock</span>
    </a>
    <button class="fab" onclick="toggleModal()">＋</button>
    <a href="#" class="nav-item">
      <span class="nav-icon">📈</span>
      <span>Trends</span>
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span>Config</span>
    </a>
  </nav>

  <div class="modal-overlay" id="addModal" onclick="if(event.target == this) toggleModal()">
    <div class="modal-content">
      <div style="width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px;"></div>
      <h2 style="margin-bottom: 24px;">Nouvel Article</h2>
      
      <div class="input-group">
        <label>Nom du produit</label>
        <input type="text" class="input-control" placeholder="Ex: PS5 Slim, Dunk Low...">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="input-group">
          <label>Prix d'achat (€)</label>
          <input type="number" class="input-control" placeholder="0.00">
        </div>
        <div class="input-group">
          <label>Prix de revente (€)</label>
          <input type="number" class="input-control" placeholder="0.00">
        </div>
      </div>

      <div class="input-group">
        <label>Catégorie</label>
        <select class="input-control">
          <option>Sneakers</option>
          <option>Tech</option>
          <option>Luxe</option>
          <option>Autre</option>
        </select>
      </div>

      <button class="btn-primary" onclick="toggleModal()">Enregistrer l'article</button>
    </div>
  </div>

  <script>
    function toggleModal() {
      const modal = document.getElementById('addModal');
      modal.classList.toggle('active');
    }
    
    // Ajout d'une petite vibration tactile pour le bouton principal
    document.querySelector('.fab').addEventListener('click', () => {
      if ('vibrate' in navigator) navigator.vibrate(10);
    });
  </script>
</body>
</html>
